<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
  <div>
    <h1 class="text-4xl font-bold mb-4">Hello, I'm {{ person.fullname }}</h1>
    <p class="text-xl">{{ person.description }}</p>

    {% if person.image %}
    <img src="{{ url_for('static', filename='img/' + person.image) }}" alt="Profile" class="mt-6 rounded-full w-48 mx-auto">
    {% endif %}
</div>
</body>
</html>
